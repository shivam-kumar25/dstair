<footer id="dstair-footer" class="mt-auto border-t relative z-20 overflow-hidden">
    <div class="absolute inset-0 opacity-10 mix-blend-overlay pointer-events-none bg-pattern-dots-xl"></div>
    <div class="footer-brand-glow absolute top-0 right-0 pointer-events-none opacity-30"
        style="width:600px; height:600px; border-radius:50%; filter:blur(120px); right:-12rem; top:-14rem;"></div>

    <div style="max-width:72rem; margin:0 auto; padding:3rem 3rem 2rem; position:relative; z-index:10;">

        <!-- Main content row -->
        <div style="display:flex; align-items:center; gap:3rem; flex-wrap:wrap;">

            <!-- Logo + wordmark block -->
            <div style="display:flex; align-items:center; gap:1.25rem; flex-shrink:0;">
                <div style="width:4rem; height:4rem; background:rgba(255,255,255,0.08); border-radius:0.875rem; border:1px solid rgba(255,255,255,0.12); display:flex; align-items:center; justify-content:center; padding:0.4rem; box-shadow:0 8px 24px rgba(0,0,0,0.3);">
                    <img src="{{ url_for('static', filename='assets/general/logo.png') }}" alt="DSTAIR"
                        style="height:100%; width:auto; object-fit:contain; opacity:0.9;">
                </div>
                <span style="font-family:Outfit, sans-serif; font-size:2.25rem; font-weight:900; letter-spacing:-0.03em; color:#ffffff; line-height:1;">DSTAIR</span>
            </div>

            <!-- Vertical divider -->
            <div style="width:1px; height:3.5rem; background:rgba(255,255,255,0.1); flex-shrink:0; display:none;" class="footer-divider"></div>

            <!-- Tagline + badge -->
            <div style="display:flex; flex-direction:column; gap:0.875rem;">
                <p style="color:rgba(255,255,255,0.45); font-size:0.875rem; line-height:1.7; margin:0; max-width:26rem;">
                    The global standard for institutional reform analysis — quantifying the legitimacy of governance using advanced social metrics.
                </p>
                
            </div>

        </div>

        <!-- Bottom copyright bar -->
        <div style="margin-top:2rem; padding-top:1.25rem; border-top:1px solid rgba(255,255,255,0.07); text-align:center;">
            <p style="font-size:0.72rem; color:rgba(255,255,255,0.22); font-weight:300; margin:0; letter-spacing:0.04em;">
                &copy; {{ current_year | default('2026') }} DSTAIR &nbsp;&middot;&nbsp; All rights reserved.
            </p>
        </div>

    </div>

    <style>
        @media (min-width: 640px) {
            .footer-divider { display: block !important; }
        }
    </style>
</footer>
