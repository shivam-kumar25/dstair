{% extends 'base.html' %}

{% block title %}Sign In | DSTAIR{% endblock %}

{% block extra_css %}
<style>
    /* ── Page shell ─────────────────────────────────────────────── */
    .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem;
        background:
            linear-gradient(rgba(5, 10, 20, 0.72), rgba(5, 10, 20, 0.82)),
            url("{{ url_for('static', filename='assets/login.png') }}") center / cover no-repeat;
    }

    /* ── Centered wrapper ───────────────────────────────────────── */
    .login-wrap {
        width: 100%;
        max-width: 26rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
    }

    /* ── Card ───────────────────────────────────────────────────── */
    .login-card {
        width: 100%;
        background: #ffffff;
        border-radius: 1.5rem;
        padding: 2.5rem 2rem;
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
    }

    /* ── Form fields ────────────────────────────────────────────── */
    .login-form {
        display: flex;
        flex-direction: column;
        gap: 1.375rem;
    }

    .login-field {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .login-label {
        font-size: 0.8125rem;
        font-weight: 600;
        color: #374151;
        letter-spacing: 0.01em;
    }

    .login-input-wrap {
        position: relative;
    }

    .login-input-icon {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        display: flex;
        align-items: center;
        pointer-events: none;
        transition: color 0.2s;
    }

    .login-input {
        width: 100%;
        height: 3.25rem;
        padding: 0 1rem 0 3rem;
        font-size: 1rem;
        color: #0f172a;
        background: #f8fafc;
        border: 1.5px solid #e2e8f0;
        border-radius: 0.75rem;
        transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        appearance: none;
        -webkit-appearance: none;
    }

    .login-input::placeholder {
        color: #94a3b8;
        font-size: 0.9375rem;
    }

    .login-input:focus {
        outline: none;
        background: #fff;
        border-color: #d97706;
        box-shadow: 0 0 0 4px rgba(217, 119, 6, 0.12);
    }

    .login-input:focus ~ .login-input-icon {
        color: #d97706;
    }

    /* ── Submit button ──────────────────────────────────────────── */
    .login-submit {
        width: 100%;
        height: 3.25rem;
        margin-top: 0.5rem;
        background: linear-gradient(135deg, #d97706, #ea580c);
        color: #fff;
        font-size: 1rem;
        font-weight: 700;
        border: none;
        border-radius: 0.75rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        box-shadow: 0 6px 20px rgba(217, 119, 6, 0.35);
        transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
    }

    .login-submit:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 10px 28px rgba(217, 119, 6, 0.45);
    }

    .login-submit:active:not(:disabled) {
        transform: translateY(0);
    }

    .login-submit:disabled {
        opacity: 0.7;
        cursor: wait;
    }

    /* ── Spinner ────────────────────────────────────────────────── */
    .login-spinner {
        width: 1.25rem;
        height: 1.25rem;
        animation: login-spin 0.8s linear infinite;
    }

    @keyframes login-spin {
        to { transform: rotate(360deg); }
    }

    /* ── Footer link ────────────────────────────────────────────── */
    .login-footer {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.8125rem;
        color: #94a3b8;
    }

    .login-footer a {
        color: #64748b;
        text-decoration: underline;
        text-underline-offset: 3px;
        transition: color 0.2s;
    }

    .login-footer a:hover {
        color: #d97706;
    }

    /* ── Entry animation ────────────────────────────────────────── */
    @keyframes login-rise {
        from { opacity: 0; transform: translateY(1.25rem); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .login-card { animation: login-rise 0.5s ease both; }

    /* ── Mobile tweaks ──────────────────────────────────────────── */
    @media (max-width: 400px) {
        .login-card {
            padding: 2rem 1.375rem;
        }

        .login-brand-name {
            font-size: 1.75rem;
        }
    }

    @media (min-width: 480px) {
        .login-card {
            padding: 2.75rem 2.5rem;
        }
    }
</style>
{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}
<section class="login-page">
    <div class="login-wrap">

        <!-- Card -->
        <div class="login-card">
            <form action="{{ url_for('auth.login') }}" method="POST" class="login-form" id="login-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <!-- Username -->
                <div class="login-field">
                    <label for="username" class="login-label">Username</label>
                    <div class="login-input-wrap">
                        <input type="text" id="username" name="username" required
                               autocomplete="username" class="login-input"
                               placeholder="Enter your username">
                        <span class="login-input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                 viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </span>
                    </div>
                </div>

                <!-- Password -->
                <div class="login-field">
                    <label for="password" class="login-label">Password</label>
                    <div class="login-input-wrap">
                        <input type="password" id="password" name="password" required
                               autocomplete="current-password" class="login-input"
                               placeholder="Enter your password">
                        <span class="login-input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                 viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </span>
                    </div>
                </div>

                {% if error %}
                <div style="background:#fef2f2;border:1.5px solid #fca5a5;border-radius:0.625rem;padding:0.75rem 1rem;font-size:0.875rem;color:#b91c1c;display:flex;align-items:center;gap:0.5rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    {{ error }}
                </div>
                {% endif %}

                <!-- Submit -->
                <button type="submit" class="login-submit" id="login-btn">
                    <span id="login-btn-idle" style="display:flex;align-items:center;gap:0.5rem;">
                        Sign In
                        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17"
                             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="5" y1="12" x2="19" y2="12"/>
                            <polyline points="12 5 19 12 12 19"/>
                        </svg>
                    </span>
                    <span id="login-btn-loading" style="display:none;align-items:center;gap:0.625rem;">
                        <svg class="login-spinner" xmlns="http://www.w3.org/2000/svg"
                             fill="none" viewBox="0 0 24 24">
                            <circle style="opacity:.25" cx="12" cy="12" r="10"
                                    stroke="currentColor" stroke-width="4"/>
                            <path style="opacity:.75" fill="currentColor"
                                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                        </svg>
                        Signing in...
                    </span>
                </button>
            </form>

            <div class="login-footer">
                Need access? <a href="{{ url_for('public.contact') }}">Contact your administrator</a>
            </div>
        </div>

    </div>
</section>

<script>
document.getElementById('login-form').addEventListener('submit', function () {
    var btn = document.getElementById('login-btn');
    btn.disabled = true;
    document.getElementById('login-btn-idle').style.display = 'none';
    document.getElementById('login-btn-loading').style.display = 'flex';
});
</script>
{% endblock %}
