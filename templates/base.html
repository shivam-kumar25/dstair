<!DOCTYPE html>
<html lang="en" class="scroll-smooth bg-canvas">

<!-- 
  =============================================================================
  BASE TEMPLATE (base.html)
  =============================================================================
  This is the Master Layout for the entire DSTAIR application. 
  Every other UI template extends this file (`extends "base.html"`).
  
  Technology Stack:
  - Styling: TailwindCSS (Utility classes) + Custom `base.css` components
  - Interactivity: Alpine.js (Lightweight reactive state, modals, toasts)
  - Fonts: Inter (Data/UI) & Outfit (Headers/Branding)
  =============================================================================
-->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <!-- Dynamic Title: Child templates override this block -->
    <title>{% block title %}DSTAIR - Advanced Institutional Analytics{% endblock %}</title>

    <!-- Preconnect & Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">


    <!-- Alpine.js with Collapse Plugin for modern interaction mechanics (dropdowns/accordions) -->
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>


    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/general/logo.png') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='assets/general/logo.png') }}">

    <!-- Main Custom CSS File (Contains Tailwind component definitions) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}?v={{ range(1000,9999) | random }}">

    <!-- Injection point for page-specific CSS files -->
    {% block extra_css %}{% endblock %}
</head>

<body class="bg-canvas font-sans text-anchor antialiased selection:bg-catalyst/30 selection:text-anchor">

    <!-- 
      Global Alpine.js App State 
      `x-data` initializes reactive variables for the global toast notification system
    -->
    <div id="dstair-app" class="relative flex flex-col min-h-screen overflow-x-hidden" 
         x-data="{ toastVisible: false, toastMessage: '', toastType: 'success', 
                showToast(msg, type='success') { 
                    this.toastMessage = msg; 
                    // Map categories to standard types
                    this.toastType = (type === 'danger' || type === 'error') ? 'error' : 
                                     (type === 'info' ? 'info' : 'success');
                    this.toastVisible = true; 
                    setTimeout(() => { this.toastVisible = false }, 4000); 
                },
                init() {
                    window.showToast = (msg, type) => this.showToast(msg, type);
                }
              }" x-init="init()">

        <!-- 
          Flash Messages Handler 
          Intercepts Flask's backend get_flashed_messages() and binds them to Alpine's showToast method 
        -->
        <div class="hidden" x-init="
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    setTimeout(() => showToast('{{ message|escape }}', '{{ category }}'), 100);
                {% endfor %}
            {% endif %}
        {% endwith %}
    "></div>

        <!-- Global Navigation Component -->
        {% block navbar %}
        {% include 'includes/nav.html' %}
        {% endblock %}

        <!-- 
          Main Content Context 
          Child templates inject their primary HTML into this block.
          flex-grow ensures the footer remains at the bottom of the screen.
        -->
        <main class="flex-grow relative z-10 origin-top flex flex-col">
            {% block content %}{% endblock %}
        </main>

        <!-- Global Footer Component -->
        {% include 'includes/footer.html' %}

        <!-- 
          Global Tactile Toast Notification UI 
          Driven via Alpine.js variables defined in the #dstair-app wrapper.
        -->
        <div x-show="toastVisible" x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 translate-y-0"
            x-transition:leave-end="opacity-0 translate-y-4"
            class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 flex items-center gap-3 px-6 py-4 rounded-full shadow-float backdrop-blur-lg border font-medium text-sm"
            :class="{
            'bg-white/90 border-catalyst/20 text-anchor': toastType === 'success',
            'bg-white/90 border-red-500/20 text-red-600': toastType === 'error' || toastType === 'danger',
            'bg-white/90 border-blue-500/20 text-blue-600': toastType === 'info'
         }" style="display:none;">

            <!-- Success Checkmark Icon -->
            <svg x-show="toastType === 'success'" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-catalyst"
                fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <!-- Error Alert Icon -->
            <svg x-show="toastType === 'error' || toastType === 'danger'" xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>

            <!-- Text injection -->
            <span x-text="toastMessage"></span>
        </div>

        <!-- Injection point for page-specific JS scripts (e.g., Chart.js for dashboard) -->
        {% block scripts %}{% endblock %}

        <!-- Deep Analysis Core JS (Handles the AJAX behavior in the tool/questionnaire tab) -->
        

        <!-- Global Modals (Rendered outside main stacking context to prevent z-index issues) -->
        {% block modals %}{% endblock %}
    </div>

    <!-- Global Utilities (main.js & forms.js) -->
    <script>
/**
 * Global CSRF Helper
 */
function getCSRFToken() {
    const meta = document.querySelector('meta[name="csrf-token"]');
    return meta ? meta.getAttribute('content') : '';
}

/**
 * main.js - Global UI Utilities for DSTAIR
 */

document.addEventListener('DOMContentLoaded', () => {
    const dstairApp = document.getElementById('dstair-app') || document;

    // 1. Auto-dismiss flash messages after 5 seconds
    const flashMessages = dstairApp.querySelectorAll('.flash-message');
    if (flashMessages.length > 0) {
        setTimeout(() => {
            flashMessages.forEach(msg => {
                msg.style.transition = 'opacity 0.5s ease-out, transform 0.5s ease-out';
                msg.style.opacity = '0';
                msg.style.transform = 'translateY(-10px)';

                setTimeout(() => msg.remove(), 500); // Remove from DOM after transition
            });
        }, 5000);
    }

    // 2. Global Modal Esc Key Handler (fallback if individual pages don't have it)
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            const activeOverlays = dstairApp.querySelectorAll('.modal-overlay.active, .modal-overlay:not(.hidden)');
            const activeModals = dstairApp.querySelectorAll('.modal-content.active, .modal-content:not(.hidden)');

            activeOverlays.forEach(overlay => {
                overlay.classList.remove('active');
                if (overlay.id === 'toolModalOverlay') { // Special case for generic tailwind hiding
                    overlay.classList.add('opacity-0');
                    setTimeout(() => overlay.classList.add('hidden'), 300);
                }
            });

            activeModals.forEach(modal => {
                modal.classList.remove('active');
                if (modal.id === 'toolModalContent') {
                    modal.classList.add('opacity-0', 'scale-95');
                    setTimeout(() => modal.classList.add('hidden'), 300);
                }
            });
            document.body.style.overflow = '';
        }
    });

    // 3. Smooth scrolling for internal anchors
    dstairApp.querySelectorAll('a[href^="#"]').forEach(anchor => {
        // Skip default # links
        if (anchor.getAttribute('href') === '#') return;

        anchor.addEventListener('click', function (e) {
            e.preventDefault();
            const targetId = this.getAttribute('href').substring(1);
            const targetEl = document.getElementById(targetId);
            if (targetEl) {
                targetEl.scrollIntoView({
                    behavior: 'smooth'
                });
            }
        });
    });
});


/**
 * forms.js - Progressive Form Enhancement and Validation
 */

document.addEventListener('DOMContentLoaded', () => {
    const dstairApp = document.getElementById('dstair-app') || document;

    // Select all forms that shouldn't bypass validation
    const standardForms = dstairApp.querySelectorAll('form:not([novalidate])');

    standardForms.forEach(form => {
        // 1. Disable native HTML5 tooltips to use custom validation UI if desired
        // form.setAttribute('novalidate', true);

        // 2. Add visual feedback on input
        const inputs = form.querySelectorAll('input, select, textarea');

        inputs.forEach(input => {
            // When user types or changes, remove error styling if valid
            input.addEventListener('input', () => {
                if (input.checkValidity()) {
                    input.classList.remove('border-red-500', 'focus:border-red-500');
                    // Find and remove associated error message if exists
                    const errorMsg = input.parentNode.querySelector('.custom-error-msg');
                    if (errorMsg) {
                        errorMsg.remove();
                    }
                }
            });

            // Add custom invalid event handler
            input.addEventListener('invalid', (e) => {
                e.preventDefault(); // Prevent standard browser tooltip

                // Add error styling
                input.classList.add('border-red-500', 'focus:border-red-500');

                // Show custom error message
                let errorMsg = input.parentNode.querySelector('.custom-error-msg');
                if (!errorMsg) {
                    errorMsg = document.createElement('p');
                    errorMsg.className = 'custom-error-msg text-red-500 text-xs mt-1 font-medium';

                    // Specific logical messages based on input type
                    if (input.validity.valueMissing) {
                        errorMsg.textContent = 'This field is required.';
                    } else if (input.validity.typeMismatch && input.type === 'email') {
                        errorMsg.textContent = 'Please enter a valid email address.';
                    } else if (input.validity.tooShort) {
                        errorMsg.textContent = `Must be at least ${input.getAttribute('minlength')} characters.`;
                    } else {
                        errorMsg.textContent = input.validationMessage;
                    }

                    input.parentNode.insertBefore(errorMsg, input.nextSibling);
                }
            });
        });

        // 3. Handle Submit state (disable button, show loading)
        form.addEventListener('submit', (e) => {
            // If form is valid and NOT an AJAX form (AJAX forms handle their own submission in JS)
            if (form.checkValidity() && !form.dataset.ajax) {
                const submitBtn = form.querySelector('button[type="submit"]');
                if (submitBtn) {
                    // Prevent double submission
                    if (submitBtn.dataset.submitted === 'true') {
                        e.preventDefault();
                        return;
                    }

                    submitBtn.dataset.submitted = 'true';

                    // Store original text
                    if (!submitBtn.dataset.originalHtml) {
                        submitBtn.dataset.originalHtml = submitBtn.innerHTML;
                    }

                    // Change to loading state
                    submitBtn.innerHTML = `
                        <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-current inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Processing...
                    `;
                    submitBtn.style.opacity = '0.7';
                    submitBtn.style.cursor = 'wait';
                }
            }
        });
    });
});

    </script>
</body>


</html>
